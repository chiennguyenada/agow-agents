services:
  openclaw:
    image: ghcr.io/openclaw/openclaw:latest
    container_name: agow-openclaw
    restart: unless-stopped
    ports:
      - "127.0.0.1:18789:18789"
    volumes:
      - ./openclaw-home:/home/node/.openclaw
      - ./workspaces:/home/node/.openclaw/workspaces
      - ./shared-knowledge:/home/node/.openclaw/shared-knowledge
      - ./guardrails:/home/node/.openclaw/guardrails:ro
      - ./scripts:/home/node/.openclaw/scripts:ro
      - ./monitoring:/home/node/.openclaw/monitoring:ro
    env_file:
      - .env
    environment:
      - OPENCLAW_CONFIG_PATH=/home/node/.openclaw/openclaw.json
      - OPENCLAW_PORT=18789
      - TZ=Asia/Ho_Chi_Minh
    mem_limit: 2g
    memswap_limit: 2g
    cpus: 1.5
    security_opt:
      - no-new-privileges:true
    read_only: false
    tmpfs:
      - /tmp:size=256M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:18789/health"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    networks:
      - agow-net

networks:
  agow-net:
    driver: bridge
    internal: false
